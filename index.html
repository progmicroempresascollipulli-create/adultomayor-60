<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Consulta RUT</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.contenedor{
    background:white;
    padding:30px;
    border-radius:15px;
    width:350px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
    text-align:center;
}

h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#0078ff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#005ecc;
}

#resultado{
    margin-top:20px;
    font-size:18px;
}

</style>

</head>

<body>

<div class="contenedor">

<h2>Consulta RUT</h2>

<input
type="text"
id="rut"
placeholder="Ingrese RUT"
/>

<button onclick="buscarRut()">
Buscar
</button>

<div id="resultado"></div>

</div>

<script>

async function buscarRut() {

    const rut = document.getElementById("rut").value;

    if(rut === ""){

        document.getElementById("resultado").innerHTML =
        "Ingrese un RUT";

        return;
    }

    const url =
    "https://script.google.com/macros/s/AKfycbzSdURJh-QJuLnsvEAo-cHMgE9Clfap1WkkHR6Sn8lxncsdHv0SGk30IcQeyiL0g75eOQ/exec?rut=" +
    encodeURIComponent(rut);

    try {

        const response = await fetch(url);

        const data = await response.json();

        if(data.encontrado){

            document.getElementById("resultado").innerHTML =
            "<b>Nombre:</b> " + data.nombre +
            "<br><b>Estado:</b> " + data.estado;

        } else {

            document.getElementById("resultado").innerHTML =
            "RUT no encontrado";

        }

    } catch(error){

        document.getElementById("resultado").innerHTML =
        "Error de conexión";

        console.log(error);

    }

}

</script>

</body>

</html>
