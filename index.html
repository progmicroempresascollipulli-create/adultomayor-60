<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Consulta RUT</title>

<style>

body{
    font-family:Arial;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.caja{
    background:white;
    padding:30px;
    border-radius:15px;
    width:350px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border-radius:8px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#0078ff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

#resultado{
    margin-top:20px;
}

</style>

</head>

<body>

<div class="caja">

<h2>Consulta RUT</h2>

<input
id="rut"
type="text"
placeholder="Ingrese su RUT"
/>

<button onclick="buscarRut()">
Buscar
</button>

<div id="resultado"></div>

</div>

<script>

async function buscarRut(){

    const inputRut = document.getElementById("rut");

    const rut = inputRut.value;

    if(rut === ""){

        document.getElementById("resultado").innerHTML =
        "Ingrese un RUT";

        return;
    }

    const url =
    "https://script.google.com/macros/s/AKfycbyZ-IGCldbtAr3d3ya6_crrLsAJPA99xCyY5i0utjkkEtFBmJTtBsUHLGdIQBMA9o3twQ/exec?rut=" +
    encodeURIComponent(rut);

    try{

        const response = await fetch(url);

        const data = await response.json();

        if(data.encontrado){

            document.getElementById("resultado").innerHTML =
            "<b>Nombre:</b> " + data.nombre +
            "<br><b>Estado:</b> " + data.estado;

        }else{

            document.getElementById("resultado").innerHTML =
            "RUT no encontrado";

        }

    }catch(error){

        document.getElementById("resultado").innerHTML =
        "Error de conexión";

        console.log(error);

    }

}

</script>

</body>

</html>
